{% extends "base.html" %}
{% block title %}新建仓库 — Gitom{% endblock %}
{% block content %}
<div class="container container-sm">
  <h1>新建仓库</h1>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" action="/user/settings/repos/new" class="card">
    <div class="form-group">
      <label>仓库名称 <span class="required">*</span></label>
      <input type="text" name="name" required autofocus
             pattern="[a-zA-Z0-9_.\-]+" class="input"
             placeholder="my-project">
      <small class="muted">只允许字母、数字、连字符、下划线和点号。</small>
    </div>
    <div class="form-group">
      <label>描述（可选）</label>
      <input type="text" name="description" class="input" placeholder="简短描述…">
    </div>
    <div class="form-group">
      <label class="checkbox-label">
        <input type="checkbox" name="is_private">
        <span>私有仓库</span>
      </label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn">创建仓库</button>
      <a href="/" class="btn btn-ghost">取消</a>
    </div>
  </form>
</div>
{% endblock %}
