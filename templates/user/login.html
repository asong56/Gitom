{% extends "base.html" %}
{% block title %}登录 — Gitom{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="#89b4fa" stroke-width="2"/>
        <path d="M12 20h16M20 12v16" stroke="#89b4fa" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h1>Gitom</h1>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/user/login">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" name="username" required autofocus class="input">
      </div>
      <div class="form-group">
        <label>密码 / Token</label>
        <input type="password" name="password" required class="input">
      </div>
      <button type="submit" class="btn btn-block">登录</button>
    </form>
  </div>
</div>
{% endblock %}
